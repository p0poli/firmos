name: Deploy Frontend (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# peaceiris/actions-gh-pages pushes the build output to the gh-pages
# branch using GITHUB_TOKEN, so the workflow needs write access to the
# repo contents.
permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          # Falls back to the value baked into src/api/index.js when the
          # secret is not set. CI=false stops react-scripts from treating
          # ESLint warnings as build failures.
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: "false"
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          publish_branch: gh-pages
          # Disable Jekyll so files/folders starting with `_` (CRA emits
          # none today, but future tooling might) are served as-is.
          enable_jekyll: false
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
