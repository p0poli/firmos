name: Deploy Frontend (GitHub Pages)

# Build the React app and publish it via the official GitHub Pages
# Actions flow. Pages serves the artifact directly — no `gh-pages`
# branch is created or maintained.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Required by actions/deploy-pages: read repo contents, write the
# Pages artifact, and mint an OIDC token so the deploy action can
# authenticate to the Pages service without a secret.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel any in-flight run on a new push.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          # Falls back to the value baked into src/api/index.js when the
          # secret is unset (the live Render backend URL).
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          # CRA treats ESLint warnings as errors when CI=true (the GitHub
          # Actions default). Disable so warnings don't break the build.
          CI: "false"
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
